name: skala-gpu
channels:
  - conda-forge
dependencies:
  - ase
  - azure-core
  - azure-identity
  - dftd3-python
  - e3nn
  - h5py
  - numpy
  - opt_einsum_fx
  - pyscf >=2.8,<2.14
  - python
  - pytorch-gpu
  - qcelemental
  - cuda-toolkit >=12,<13
  - cuda-version >=12,<13
  - cutensor >=2
  # Testing and development
  - pre-commit
  - pytest
  - pytest-cov
  - pytest-randomly
  - ruff
  - mypy
  - pip:
    - huggingface_hub
    - gpu4pyscf-cuda12x ==1.5
