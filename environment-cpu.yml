name: skala-cpu
channels:
  - conda-forge
dependencies:
  - ase
  - azure-core
  - azure-identity
  - dftd3-python
  - e3nn
  - h5py
  - numpy <2.5
  - opt_einsum_fx
  - pyscf >=2.8,<2.14
  - python <3.13
  - pytorch * cpu_*
  - qcelemental
# Testing and development
  - pre-commit
  - pytest
  - pytest-cov
  - pytest-randomly
  - ruff
  - mypy
  - pip:
    - huggingface_hub
